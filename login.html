<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docedos - Ingresar</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/assets/images/logo.png">
    
    <link rel="stylesheet" href="styles.css">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="/assets/images/logo.png">
</head>
<body class="dark-theme">
    <header class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="logo">
                <span>docedos</span>
            </a>
            <div class="nav-controls">
                <div class="settings-dropdown">
                    <button class="settings-toggle" id="btn-settings" title="Configuración">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    </button>
                    <div class="settings-menu" id="settings-menu">
                        <span>Color</span>
                        <div class="color-options">
                            <button class="color-btn blue" data-color="blue" title="Azul (Original)"></button>
                            <button class="color-btn pink" data-color="pink" title="Rosa"></button>
                            <button class="color-btn green" data-color="green" title="Verde Eléctrico"></button>
                        </div>
                    </div>
                </div>

                <button class="theme-toggle" id="btn-theme">
                    <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>

                <button class="lang-toggle" id="btn-lang">EN</button>
                <a href="login.html" class="btn btn-outline" id="btn-ingresar">Ingresar</a>
            </div>
        </div>
    </header>

    <main class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-tabs">
                <button id="tab-login" class="tab-btn active">Iniciar Sesión</button>
                <button id="tab-register" class="tab-btn">Crear Cuenta</button>
            </div>

            <form id="form-login" class="auth-form active">
                <div class="input-group">
                    <label for="login-email" id="lbl-email-login">Correo Electrónico</label>
                    <input type="email" id="login-email" required autocomplete="email" placeholder="ejemplo@correo.com">
                </div>
                <div class="input-group">
                    <label for="login-password" id="lbl-pass-login">Contraseña</label>
                    <input type="password" id="login-password" required autocomplete="current-password" placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary w-100" id="btn-submit-login">Ingresar</button>
            </form>

            <form id="form-register" class="auth-form" style="display: none;">
                <div class="input-group">
                    <label for="register-name" id="lbl-name-reg">Nombre</label>
                    <input type="text" id="register-name" required autocomplete="name" placeholder="Tu nombre">
                </div>
                <div class="input-group">
                    <label for="register-email" id="lbl-email-reg">Correo Electrónico</label>
                    <input type="email" id="register-email" required autocomplete="email" placeholder="ejemplo@correo.com">
                </div>
                <div class="input-group">
                    <label for="register-password" id="lbl-pass-reg">Contraseña</label>
                    <input type="password" id="register-password" required autocomplete="new-password" placeholder="Crea una contraseña">
                </div>
                <button type="submit" class="btn btn-primary w-100" id="btn-submit-reg">Registrarse</button>
            </form>
        </div>
    </main>

    <footer class="footer-dark">
        <div class="footer-left">
            <span class="copyright">&copy; 2026 docedos</span>
        </div>
        <div class="footer-center">
            <span class="verse" id="verse-text">"No os conforméis a este siglo, sino transformaos por medio de la renovación de vuestro entendimiento..." <strong class="verse-ref">— Romanos 12:2</strong></span>
        </div>
        <div class="footer-right">
            <span class="attribution" id="attribution-text">
                Logo creado por: <a href="https://www.flaticon.es/iconos-gratis/espada" target="_blank">FR_Media - Flaticon</a>
            </span>
        </div>
    </footer>
    
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
